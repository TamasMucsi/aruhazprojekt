<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Áruház</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <navbar id="js-navbar">
        <script>
            fetch("navbar.html")
                .then(response => response.text())
                .then(data => {
                    document.getElementById("js-navbar").innerHTML = data;
                })
                .catch(error => console.error("Hiba a menü betöltődésekor!", error));
        </script>
    </navbar>

    <button id="kosarmodalgomb" class="ms-3 mb-3 mt-3" data-bs-target="#kosarModal" data-bs-toggle="modal"><i class="bi bi-cart"></i> Kosaram megtekintése</button>
    <div class="main d-flex">
        <div class="container-fluid w-75">
            <div class="row justify-content-center g-3" id="cipokcardok"></div>
        </div>


    </div>

    <footer class="footer">
        <script>
            fetch("footer.html")
                .then(response => response.text())
                .then(data => {
                    document.querySelector(".footer").innerHTML = data;
                })
                .catch(error => console.error("Hiba a menü betöltődésekor!", error));; 
        </script>
    </footer>






    <!-- KOSARMODAL -->

    <div class="modal" tabindex="-1" id="kosarModal">
        <div class="modal-dialog modal-xl">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Az én kosaram:</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="row d-flex justify-content-center g-5" id="kosarBody"></div>
                    
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Bezárás</button>
                    <button type="button" class="btn btn-primary" id="kosarUritesGomb">Kosár Kiürítése</button>
                </div>
            </div>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"></script>
    <script src="js/script.js"></script>
</body>

</html>
